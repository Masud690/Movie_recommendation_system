<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommender</title>

    <style>
        body {
            background-color: #141414;
            color: white;
            font-family: Arial;
            margin: 0;
        }

        header {
            background-color: black;
            padding: 15px;
            font-size: 24px;
            font-weight: bold;
            color: red;
        }

        .search-box {
            text-align: center;
            margin: 20px;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px;
            background-color: red;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkred;
        }

        .movies {
            display: flex;
            overflow-x: auto;
            padding: 20px;
            gap: 15px;
        }

        .card {
            text-align: center;
        }

        .card img {
            width: 150px;
            border-radius: 10px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .card img:hover {
            transform: scale(1.2);
            box-shadow: 0px 10px 25px rgba(0,0,0,0.8);
        }

        .card p {
            font-size: 14px;
            margin-top: 5px;
        }

        .message {
            text-align: center;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<header>🎬 Movie Recommender</header>

<div class="search-box">
    <input type="text" id="movie" placeholder="Enter movie name">
    <button onclick="getRecommendations()">Search</button>
</div>

<div id="message" class="message"></div>

<div class="movies" id="movies"></div>

<script>
async function getRecommendations() {
    let movie = document.getElementById("movie").value;
    let container = document.getElementById("movies");
    let message = document.getElementById("message");

    // Clear previous
    container.innerHTML = "";
    message.innerHTML = "Loading... ⏳";

    try {
        let response = await fetch(`/recommend/${movie}`);
        let data = await response.json();

        // Handle not found
        if (data.recommendations[0] === "Movie not found") {
            message.innerHTML = "No movie found 😢";
            return;
        }

        message.innerHTML = "";

        data.recommendations.forEach(m => {
            let div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <img src="https://via.placeholder.com/150x220?text=${m}">
                <p>${m}</p>
            `;

            container.appendChild(div);
        });

    } catch (error) {
        message.innerHTML = "Error connecting to server ❌";
    }
}
</script>

</body>
</html>
